<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能记账</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <!-- 头部 -->
        <header class="bg-blue-600 text-white p-4">
            <h1 class="text-xl font-bold">💰 智能记账</h1>
            <p class="text-sm opacity-80">说句话就能记账</p>
        </header>

        <!-- API Key 设置 -->
        <div class="p-4 border-b bg-gray-50">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium text-gray-700">智谱 API Key</span>
                <button id="toggleKeyBtn" class="text-xs text-blue-600">显示</button>
            </div>
            <input type="password" id="apiKeyInput" 
                placeholder="输入你的智谱 API Key" 
                class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-xs text-gray-500 mt-1">
                <a href="https://open.bigmodel.cn/" target="_blank" class="text-blue-600">去智谱申请免费 Key</a>
            </p>
        </div>

        <!-- 记账输入区 -->
        <div class="p-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">说句话记账</label>
            <div class="relative">
                <input type="text" id="recordInput" 
                    placeholder="例：今天去陈记顺和吃了200块" 
                    class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-12">
                <button id="submitBtn" class="absolute right-2 top-2 bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">
                    记账
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-2">试试：「打车花了35」「买了杯奶茶18」「房租2500」</p>
        </div>

        <!-- 解析结果预览 -->
        <div id="previewArea" class="hidden px-4 pb-4">
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                <h3 class="text-sm font-medium text-blue-800 mb-2">解析结果</h3>
                <div id="previewContent" class="space-y-1 text-sm"></div>
                <div class="flex gap-2 mt-3">
                    <button id="confirmBtn" class="flex-1 bg-green-600 text-white py-2 rounded-lg text-sm hover:bg-green-700">
                        ✓ 确认保存
                    </button>
                    <button id="cancelBtn" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg text-sm hover:bg-gray-400">
                        取消
                    </button>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="px-4 pb-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-red-50 p-3 rounded-lg">
                    <p class="text-xs text-red-600">本月支出</p>
                    <p class="text-xl font-bold text-red-700" id="monthTotal">¥0</p>
                </div>
                <div class="bg-blue-50 p-3 rounded-lg">
                    <p class="text-xs text-blue-600">记账笔数</p>
                    <p class="text-xl font-bold text-blue-700" id="recordCount">0</p>
                </div>
            </div>
        </div>

        <!-- 分类统计 -->
        <div class="px-4 pb-4">
            <h3 class="text-sm font-medium text-gray-700 mb-2">分类统计</h3>
            <div id="categoryStats" class="space-y-2"></div>
        </div>

        <!-- 分类筛选 -->
        <div class="px-4 pb-2">
            <label class="block text-sm font-medium text-gray-700 mb-2">筛选分类</label>
            <select id="categoryFilter" class="w-full px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">全部</option>
                <option value="餐饮">餐饮</option>
                <option value="交通">交通</option>
                <option value="购物">购物</option>
                <option value="娱乐">娱乐</option>
                <option value="居住">居住</option>
                <option value="医疗">医疗</option>
                <option value="教育">教育</option>
                <option value="其他">其他</option>
            </select>
        </div>

        <!-- 最近记录 -->
        <div class="px-4 pb-20">
            <h3 class="text-sm font-medium text-gray-700 mb-2">最近记录</h3>
            <div id="recentRecords" class="space-y-2"></div>
        </div>
    </div>

    <!-- 加载提示 -->
    <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-4 rounded-lg flex items-center gap-3">
            <div class="animate-spin h-5 w-5 border-2 border-blue-600 border-t-transparent rounded-full"></div>
            <span class="text-sm">AI 解析中...</span>
        </div>
    </div>

    <!-- 撤销确认弹窗 -->
    <div id="undoModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg max-w-sm mx-4">
            <h3 class="text-lg font-medium mb-2">确认撤销？</h3>
            <p class="text-sm text-gray-600 mb-4">删除这条记录：<span id="undoRecordText" class="font-medium"></span></p>
            <div class="flex gap-3">
                <button id="confirmUndoBtn" class="flex-1 bg-red-600 text-white py-2 rounded-lg text-sm hover:bg-red-700">
                    确认删除
                </button>
                <button id="cancelUndoBtn" class="flex-1 bg-gray-300 text-gray-700 py-2 rounded-lg text-sm hover:bg-gray-400">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
